{
  "data_directory": "~/.local/var/lib/psiphon-proxy",
  "log_file": "~/.local/var/log/psiphon/psiphond-ng-proxy.log",
  "log_level": "info",

  "propagation_channel_id": "FFFFFFFFFFFFFFFF",
  "sponsor_id": "FFFFFFFFFFFFFFFF",
  "client_version": "1.0.0-proxy",
  "client_platform": "linux-proxy",

  // In-proxy server (proxy) mode
  "inproxy_mode": "proxy",
  "inproxy_broker_server_addresses": ["broker.example.com:443"],

  // Identity - generate these keys!
  "inproxy_session_private_key": "YOUR_BASE64_ENCODED_PRIVATE_KEY_HERE",
  "inproxy_session_root_obfuscation_secret": "YOUR_BASE64_ENCODED_SECRET_HERE",

  // Limits
  "inproxy_max_common_clients": 10,
  "inproxy_max_personal_clients": 5,
  "inproxy_rate_limiting": true,

  // Egress interface to connect to Psiphon servers
  "inproxy_egress_interface": "eth0",
  "inproxy_mtu": 1500,

  // Optional: Connection approval via WebSocket
  // Uncomment and configure if you have an approval server
  // "inproxy_approval_websocket_url": "ws://127.0.0.1:8080/approve",
  // "inproxy_approval_timeout": "5s",

  // Server list fetching (proxy needs to know servers too)
  "disable_remote_server_list_fetcher": false,
  "remote_server_list_download_filename": "remote_server_list",
  "obfuscated_server_list_download_directory": "obfuscated_server_lists",

  "tunnel_pool_size": 2,
  "connection_worker_pool_size": 5,

  "psiphon_api_request_timeout": "30s",
  "psiphon_api_connected_request_period": "5m",
  "tactics_wait_period": "10s",
  "disable_tactics": false,

  "use_indistinguishable_tls": true
}
